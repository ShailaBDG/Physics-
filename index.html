<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Study</title>
</head>
<body>
    <h1>Welcome to the Physics Study</h1>
    <div>
        <label for="username">Username:</label>
        <input type="text" id="username" placeholder="Enter your username" required>
        <button id="loginButton">Login</button>
    </div>
    <script>
        document.getElementById('loginButton').addEventListener('click', function() {
            const username = document.getElementById('username').value;
            if (username) {
                // Redirect to study sections (replace 'study.html' with actual study section link)
                window.location.href = 'study.html?user=' + encodeURIComponent(username);
            } else {
                alert('Please enter a username to proceed.');
            }
        });
    </script>
</body>
</html>
